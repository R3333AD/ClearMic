name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  DOTNET_VERSION: 8.0.x
  SOLUTION: ClearMic.sln

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Detect Windows SDK version
        shell: pwsh
        run: |
          $sdks = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include\*" -Directory `
            | Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } `
            | Sort-Object Name -Descending
          if (-not $sdks) { throw "No Windows SDK found" }
          $ver = $sdks[0].Name
          Write-Host "Windows SDK: $ver"
          Add-Content -Path $env:GITHUB_ENV -Value "WIN_SDK_VER=$ver"

      - name: Restore .NET dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build .NET solution (Release)
        run: dotnet build ${{ env.SOLUTION }} -c Release --no-restore

      - name: Build ClearMicApo.dll (MSVC + WDK)
        shell: pwsh
        run: |
          msbuild ClearMic.Driver/ClearMicApo.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:WindowsTargetPlatformVersion=${{ env.WIN_SDK_VER }}

      - name: Publish ApoHost
        shell: pwsh
        run: |
          dotnet publish ClearMic.ApoHost/ClearMic.ApoHost.csproj `
            -c Release -r win-x64 --no-self-contained `
            -o ClearMic.ApoHost/bin/Release/net8.0-windows/publish

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix
          wix eula accept wix7

      - name: Build MSI
        shell: pwsh
        run: wix build -arch x64 -o ClearMicAPO.msi ClearMic.Installer/Package.wxs

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClearMic-MSI
          path: ClearMicAPO.msi

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: ClearMic-MSI

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClearMic ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: ClearMicAPO.msi
          draft: true
          prerelease: false
