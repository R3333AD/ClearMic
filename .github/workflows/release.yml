name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  DOTNET_VERSION: 8.0.x
  SOLUTION: ClearMic.sln

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build (Release)
        run: dotnet build ${{ env.SOLUTION }} -c Release --no-restore

      - name: Package
        shell: pwsh
        run: |
          $suffix = "${{ github.ref_name }}"
          $zipName = "ClearMic-${suffix}.zip"
          Add-Content -Path $env:GITHUB_ENV -Value "ZIP_NAME=${zipName}"

          $releaseDir = "ClearMic.App/bin/Release/net8.0-windows"
          $staging = "staging/ClearMic"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null

          # App + dependencies
          Copy-Item "$releaseDir/*" $staging -Recurse -Exclude @("*.pdb", "*.xml")

          # Denoiser model
          $modelStaging = "$staging/models"
          New-Item -ItemType Directory -Path $modelStaging -Force | Out-Null
          Copy-Item "models/denoiser_model.onnx" $modelStaging

          # Compress
          Compress-Archive -Path "staging/ClearMic/*" -DestinationPath $zipName -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClearMic-Build
          path: ClearMic-*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ClearMic-Build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClearMic ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: ClearMic-*.zip
          draft: true
          prerelease: false
